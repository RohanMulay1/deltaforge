# Alembic configuration for DeltaForge (ARCHITECTURE.md §9.4).
#
# The DB URL is intentionally NOT set here — env.py reads DATABASE_URL from the
# environment and converts async->sync (postgresql+psycopg) for the runner, so
# no secret lives in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is resolved at runtime in env.py from DATABASE_URL.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
