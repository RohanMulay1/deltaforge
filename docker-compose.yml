# DeltaForge — local compose (ARCHITECTURE.md §11.2).
#
# Postgres is HOSTED (Supabase) and referenced via DATABASE_URL in .env — it is
# NOT a compose service (locked decision #4). A commented-out postgres:16 block
# is provided at the bottom for fully-offline dev only.
#
# The backend runs migrations (`alembic upgrade head`) THEN uvicorn, so a fresh
# DATABASE_URL is brought up to head before the app serves traffic. The frontend
# talks to the backend at NEXT_PUBLIC_API_URL.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # DATABASE_URL (hosted Postgres), GROQ_API_KEY, optional WOLFRAM_KERNEL_PATH.
    env_file:
      - .env
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    # Migrate to head, then serve. --reload + the bind mount give live edits in
    # local dev; drop both for a production-style run.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    # NEXT_PUBLIC_API_URL points the browser at the backend. In compose the
    # browser runs on the host, so localhost:8000 (the published port) is what
    # it must reach — not the internal `backend` DNS name.
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

# ── Offline-only Postgres (NOT used by default; DATABASE_URL → Supabase) ───────
